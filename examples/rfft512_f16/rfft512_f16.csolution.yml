solution:
  created-by: cmsis-toolbox@2.0.0
  description: CMSIS-DSP 512-point real FFT in float16 on FVP Corstone-300 (Cortex-M55)

  compiler: AC6

  packs:
    - pack: ARM::CMSIS@>=6.0.0
    - pack: ARM::CMSIS-DSP@>=1.14.4
    - pack: ARM::V2M_MPS3_SSE_300_BSP@>=1.5.0
    - pack: ARM::CMSIS-Compiler@>=2.1.0

  target-types:
    - type: FVP
      device: ARM::SSE-300-MPS3

  build-types:
    - type: Release
      debug: off
      optimize: speed

  projects:
    - project: rfft512_f16.cproject.yml
